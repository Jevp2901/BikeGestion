<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="registro_usuario.css">
</head>

<body>
    <form class="Registro_usuario" action="insertar_usuario" method="POST">
        
        <h1 class="crear_usuario"><center>BIKE <span>GESTION</span></center></h1>

        <label>Nombre:</label><br>
        <input type="text" name="Nombre" placeholder="Nombre" required><br>

        <label>Rol:</label><br>
        <input type="number" name="id_rol" placeholder="ID de rol" required><br>

        <label>Teléfono:</label><br>
        <input type="number" name="telefono"  placeholder="Numero de contacto"><br>

        <label>Correo:</label><br>
        <input type="email" name="correo" placeholder="Correo electronico" required><br>

        <label>Contraseña:</label><br>
        <input type="text" name="contraseña" placeholder=".........." required><br>

        <label>Tienda / Sucursal:</label><br>
        <input typ="text" name="tienda" placeholder="Nombre de la tienda" ><br>

        <label>Dirección:</label><br>
        <input type="text" name="dirección" placeholder="Direccion de la tienda"><br>

        <button class="guardar" type="submit">Registrar</button>

        <div class="info">
            © 2026 Bike Gestion - Registro de usuario
        </div>
    </form>
</body>

</html>
